<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <title>Time Tracking Dashboard | Frontend Mentor by Juan Cruz Tobares</title>
  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <main class="container">
    <div id="dashboard">
      <!-- Profile Card -->
      <section class="card--profile p-0 navy-900">
        <div class="profile__top bg-primary-400 text-white p-5">
          <div class="mb-5 profile__avatar">
            <img class="profile__img" src="/images/image-jeremy.png" alt="Profile picture">
          </div>
          <div>
            <p class="text-white">Report for</p>
            <h1 class="fs-600 fw-light">Jeremy Robson</h1>
          </div>
        </div>
        <div class="profile__bottom p-4 mt-3 fw-regular gap-3">
          <a class="profile__link active" href="#" data-timeframe="daily">Daily</a>
          <a class="profile__link" href="#" data-timeframe="weekly">Weekly</a>
          <a class="profile__link" href="#" data-timeframe="monthly">Monthly</a>
        </div>
      </section>

      <!-- Work Card -->
      <section class="card--activities card--work">
        <div class="card__top">
          <!-- Work img -->
        </div>
        <div class="card__bottom">
          <div class="card__bottom-header">
            <h2 class="card-type-title">Work</h2>
            <button class="button">
              <div class="dots"></div>
            </button>
          </div>
          <div class="card__bottom-container">
            <h3>5hrs</h3>
            <p>Last Day - 7hrs</p>
          </div>
        </div>
      </section>

      <!-- Exercise Card -->
      <section class="card--activities card--exercise">
        <div class="card__top">
          <!-- Excercise img -->
        </div>
        <div class="card__bottom">
          <div class="card__bottom-header">
            <h2 class="card-type-title">Exercise</h2>
            <button class="button">
              <div class="dots"></div>
            </button>
          </div>
          <div class="card__bottom-container">
            <h3>5hrs</h3>
            <p>Last Day - 7hrs</p>
          </div>
        </div>
      </section>

      <!-- Play Card -->
      <section class="card--activities card--play">
        <div class="card__top">
          <!-- Play img -->
        </div>
        <div class="card__bottom">
          <div class="card__bottom-header">
            <h2 class="card-type-title">Play</h2>
            <button class="button">
              <div class="dots"></div>
            </button>
          </div>
          <div class="card__bottom-container">
            <h3>5hrs</h3>
            <p>Last Day - 7hrs</p>
          </div>
        </div>
      </section>

      <!-- Social Card -->
      <section class="card--activities card--social">
        <div class="card__top">
          <!-- Social img -->
        </div>
        <div class="card__bottom">
          <div class="card__bottom-header">
            <h2 class="card-type-title">Social</h2>
            <button class="button">
              <div class="dots"></div>
            </button>
          </div>
          <div class="card__bottom-container">
            <h3>5hrs</h3>
            <p>Last Day - 7hrs</p>
          </div>
        </div>
      </section>

      <!-- Study Card -->
      <section class="card--activities card--study">
        <div class="card__top">
          <!-- Study img -->
        </div>
        <div class="card__bottom">
          <div class="card__bottom-header">
            <h2 class="card-type-title">Study</h2>
            <button class="button">
              <div class="dots"></div>
            </button>
          </div>
          <div class="card__bottom-container">
            <h3>5hrs</h3>
            <p>Last Day - 7hrs</p>
          </div>
        </div>
      </section>

      <!-- Self Care Card -->
      <section class="card--activities card--self-care">
        <div class="card__top">
          <!-- Self Care img -->
        </div>
        <div class="card__bottom">
          <div class="card__bottom-header">
            <h2 class="card-type-title">Self Care</h2>
            <button class="button">
              <div class="dots"></div>
            </button>
          </div>
          <div class="card__bottom-container">
            <h3>5hrs</h3>
            <p>Last Day - 7hrs</p>
          </div>
        </div>
      </section>
      
    </div>
  </main>

  </footer> -->
  <script type="module" src="/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
